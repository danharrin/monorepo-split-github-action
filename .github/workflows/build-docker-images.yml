name: build-docker-images

on:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: read

env:
  # see https://github.com/composer/composer/issues/9368#issuecomment-718112361
  COMPOSER_ROOT_VERSION: "dev-main"

jobs:
  publish-images:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Build and push images
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/monorepo-split
          COMMIT_SHA: ${{ github.sha }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          docker build . --tag "${IMAGE_NAME}:latest" --build-arg "commitHash=${COMMIT_SHA}"

          if [[ "${REF_TYPE}" == "tag" ]]; then
            docker tag "${IMAGE_NAME}:latest" "${IMAGE_NAME}:${REF_NAME}"
            docker push "${IMAGE_NAME}:${REF_NAME}"
            echo "Pushed ${IMAGE_NAME}:${REF_NAME}"
          fi

          docker push "${IMAGE_NAME}:latest"
          echo "Pushed ${IMAGE_NAME}:latest"
